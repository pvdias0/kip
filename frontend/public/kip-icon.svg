<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#3b82f6" rx="20"/>
  
  <!-- Letter K -->
  <g transform="translate(50, 50)">
    <!-- Vertical line -->
    <rect x="20" y="0" width="12" height="100" fill="#ffffff" rx="6"/>
    
    <!-- Top diagonal -->
    <rect x="32" y="15" width="12" height="50" fill="#ffffff" rx="6" transform="rotate(45 38 40)"/>
    
    <!-- Bottom diagonal -->
    <rect x="32" y="65" width="12" height="50" fill="#ffffff" rx="6" transform="rotate(-45 38 90)"/>
  </g>
</svg>