<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    
    <!-- Shine gradient -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="200" height="200" fill="url(#bgGradient)" rx="40"/>
  
  <!-- Shine overlay -->
  <ellipse cx="70" cy="60" rx="60" ry="40" fill="url(#shineGradient)" opacity="0.6"/>
  
  <!-- Letter K - Stylized -->
  <g transform="translate(55, 45)">
    <!-- Vertical line -->
    <rect x="0" y="0" width="18" height="110" fill="#ffffff" rx="9"/>
    
    <!-- Top diagonal -->
    <path d="M18,55 L85,5 Q95,0 90,12 L35,55" fill="#ffffff"/>
    
    <!-- Bottom diagonal -->
    <path d="M18,55 L85,105 Q95,115 90,98 L35,55" fill="#ffffff"/>
  </g>
  
  <!-- Dollar coin accent -->
  <circle cx="155" cy="45" r="28" fill="rgba(255,255,255,0.95)"/>
  <circle cx="155" cy="45" r="22" fill="none" stroke="url(#bgGradient)" stroke-width="3"/>
  <text x="155" y="53" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0d9488" text-anchor="middle">$</text>
</svg>